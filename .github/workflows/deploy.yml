name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VITE_CONVEX_URL: https://useful-anaconda-961.convex.cloud
      VITE_CONVEX_STATE_KEY: libabite-main
      VITE_CONVEX_DISABLED: "false"
      VITE_CUSTOMER_SITE_URL: https://libabite-order.thatcanadian.dev
      VITE_STAFF_APP_URL: https://libabite-work.thatcanadian.dev
      VITE_ONLINE_PAYMENT_PROVIDERS: stripe
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Test
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Build frontend
        run: npm run build

      - name: Deploy Convex
        run: npx convex deploy --typecheck enable

      - name: Deploy Cloudflare Worker
        run: npx wrangler deploy --config wrangler.worker.toml

      - name: Deploy Cloudflare Pages
        run: >
          npx wrangler pages deploy dist
          --project-name libabite
          --branch main
          --commit-hash "$GITHUB_SHA"
          --commit-message "$GITHUB_REF_NAME $GITHUB_SHA"
